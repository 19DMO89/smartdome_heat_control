<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Smartdome Heat Control</title>
    <style>
        :root {
            --primary: #ff9800; --bg: #111; --card-bg: #1c1c1e;
            --text: #fff; --accent: #03a9f4; --heating: #ff5722;
        }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header-container { width: 100%; max-width: 1000px; margin-bottom: 20px; }
        .header-main { display: flex; align-items: baseline; gap: 15px; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 2.2em; font-weight: 300; }
        #stats { font-size: 0.9em; color: var(--accent); }

        .config-section { width: 100%; max-width: 1000px; background: #252527; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #333; box-sizing: border-box; }
        .global-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; }

        #room-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; padding-bottom: 120px; }
        .room-card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; position: relative; transition: opacity 0.3s; }
        .room-card.disabled { opacity: 0.5; filter: grayscale(0.5); }
        
        .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .room-title { color: var(--primary); font-weight: bold; font-size: 1.1em; }

        /* Modern Toggle Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        label { display: block; font-size: 0.7em; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        select, input { background: #2c2c2e; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 0.9em; margin-bottom: 15px; }
        
        .temp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: center; padding: 30px 0; background: linear-gradient(transparent, var(--bg) 60%); pointer-events: none; }
        .save-btn { pointer-events: auto; background: var(--primary); color: #000; border: none; padding: 16px 80px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 1.1em; box-shadow: 0 4px 25px rgba(255,152,0,0.4); }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-main">
            <h1>Smartdome Heat</h1>
            <div id="stats">Initialisiere...</div>
        </div>
    </div>

    <div class="config-section">
        <div style="margin-bottom:15px; font-weight:bold; color:var(--primary); font-size: 0.8em; letter-spacing: 1px;">HAUPTEINSTELLUNGEN</div>
        <div class="global-grid">
            <div>
                <label>Hauptthermostat</label>
                <select id="main_thermostat" onchange="currentConfig.main_thermostat=this.value"></select>
            </div>
            <div><label>Nacht-Start</label><input type="text" id="night_start" onchange="currentConfig.night_start=this.value"></div>
            <div><label>Boost-Start</label><input type="text" id="boost_start" onchange="currentConfig.morning_boost_start=this.value"></div>
        </div>
    </div>

    <div id="room-container"></div>

    <div class="save-bar">
        <button class="save-btn" onclick="saveToHA()">Konfiguration Speichern</button>
    </div>

    <script>
        let hass;
        let currentConfig = {};

        async function start() {
            try {
                hass = window.parent.document.querySelector("home-assistant").hass;
                if (!hass || !hass.states["smartdome_heat_control.config"]) {
                    setTimeout(start, 500);
                    return;
                }
                const state = hass.states["smartdome_heat_control.config"];
                currentConfig = JSON.parse(JSON.stringify(state.attributes));
                
                loadGlobal();
                renderRooms();
                updateStats();
            } catch (e) { setTimeout(start, 1000); }
        }

        function loadGlobal() {
            const mainSel = document.getElementById('main_thermostat');
            const entities = Object.keys(hass.states).filter(e => e.startsWith('climate.')).sort();
            mainSel.innerHTML = entities.map(e => `<option value="${e}" ${e === currentConfig.main_thermostat ? 'selected' : ''}>${e.replace('climate.', '')}</option>`).join('');
            document.getElementById('night_start').value = currentConfig.night_start || "22:00";
            document.getElementById('boost_start').value = currentConfig.morning_boost_start || "05:00";
        }

        function renderRooms() {
            const container = document.getElementById('room-container');
            const entities = Object.keys(hass.states).sort();
            container.innerHTML = "";
            
            Object.entries(currentConfig.rooms).forEach(([id, room]) => {
                const isEnabled = room.enabled !== false;
                const card = document.createElement('div');
                card.className = `room-card ${isEnabled ? '' : 'disabled'}`;
                card.innerHTML = `
                    <div class="room-header">
                        <span class="room-title">${room.label || id}</span>
                        <label class="switch">
                            <input type="checkbox" ${isEnabled ? 'checked' : ''} onchange="toggleRoom('${id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <label>Thermostat</label>
                    <select onchange="currentConfig.rooms['${id}'].thermostat=this.value" ${isEnabled ? '' : 'disabled'}>
                        <option value="">Keines</option>
                        ${entities.filter(e => e.startsWith('climate.')).map(e => `<option value="${e}" ${e === room.thermostat ? 'selected' : ''}>${e.replace('climate.', '')}</option>`).join('')}
                    </select>
                    <label>Sensor</label>
                    <select onchange="currentConfig.rooms['${id}'].sensor=this.value" ${isEnabled ? '' : 'disabled'}>
                        <option value="">Keiner</option>
                        ${entities.filter(e => e.startsWith('sensor.')).map(e => `<option value="${e}" ${e === room.sensor ? 'selected' : ''}>${e.replace('sensor.', '')}</option>`).join('')}
                    </select>
                    <div class="temp-row">
                        <div><label>Tag (°C)</label><input type="number" step="0.5" value="${room.target_day}" onchange="currentConfig.rooms['${id}'].target_day=parseFloat(this.value)" ${isEnabled ? '' : 'disabled'}></div>
                        <div><label>Nacht (°C)</label><input type="number" step="0.5" value="${room.target_night}" onchange="currentConfig.rooms['${id}'].target_night=parseFloat(this.value)" ${isEnabled ? '' : 'disabled'}></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleRoom(id, state) {
            currentConfig.rooms[id].enabled = state;
            renderRooms(); // UI aktualisieren (ausgrauen)
        }

        function updateStats() {
            const total = Object.keys(currentConfig.rooms).length;
            const heating = Object.values(hass.states).filter(s => s.entity_id.startsWith('climate.') && s.attributes.hvac_action === 'heating').length;
            document.getElementById('stats').innerHTML = `🏠 ${total} Räume | 🔥 ${heating} Heizen`;
        }

        async function saveToHA() {
            try {
                await hass.callWS({ type: "smartdome_heat_control/save_config", config: currentConfig });
                alert("Smartdome Heat: Konfiguration gespeichert!");
            } catch (err) { alert("Fehler: " + err.message); }
        }

        window.onload = start;
    </script>
</body>
</html>
